services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - locknear-redis:/data

  meilisearch:
    image: getmeili/meilisearch:v1.12
    ports:
      - "7700:7700"
    environment:
      MEILI_ENV: development
      MEILI_NO_ANALYTICS: "true"
    volumes:
      - locknear-meili:/meili_data

volumes:
  locknear-redis:
  locknear-meili:
